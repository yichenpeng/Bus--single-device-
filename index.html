<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公車智慧播報系統</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #111; color: #fff; font-family: Arial, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* 主選單畫面 */
        .menu-container {
            width: 100%; max-width: 500px; padding: 20px;
            display: flex; flex-direction: column; gap: 20px; text-align: center;
        }
        .menu-container h1 { color: #ffaa00; margin-bottom: 10px; font-size: 28px; }
        .menu-btn {
            padding: 20px; font-size: 20px; font-weight: bold; color: #fff;
            background: #222; border: 2px solid #444; border-radius: 12px;
            cursor: pointer; transition: 0.2s;
        }
        .menu-btn:hover { background: #333; border-color: #ffaa00; }

        /* 通用子頁面樣式 */
        .page {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #111; flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .page.active { display: flex; }
        .back-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { background: #444; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 16px; }

        /* 輸入與清單樣式 */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: #222; padding: 15px; border-radius: 6px; border: 1px solid #444; }
        .input-row { display: flex; gap: 10px; }
        input, select { flex: 1; padding: 10px; font-size: 16px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; }
        
        /* 縮小路線名稱輸入框 */
        .route-name-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: #222; padding: 12px; border-radius: 6px; border: 1px solid #444; }
        .route-name-container label { font-size: 15px; color: #ffaa00; white-space: nowrap; font-weight: bold; }
        .route-name-container input { flex: none; width: 250px; }

        button { padding: 10px 15px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }

        ul { list-style: none; padding: 0; margin: 0; }
        .drag-handle { cursor: ns-resize; color: #888; font-size: 20px; padding: 0 5px; user-select: none; }
        
        li { background: #222; border: 1px solid #444; margin-bottom: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .sortable-ghost { opacity: 0.3; background: #444; }
        .sortable-chosen { background: #333; }

        .station-info { font-size: 13px; color: #aaa; margin-top: 4px; }
        .actions { display: flex; gap: 5px; }
        .actions button { background-color: #dc3545; padding: 5px 10px; font-size: 13px; }
        .search-status { font-size: 13px; color: #ffaa00; margin-top: 5px; }

        .btn-primary { width: 100%; margin-top: 10px; }
        .btn-danger { background-color: #dc3545; padding: 6px 12px; font-size: 14px; }
.short-input { flex: none; width: 250px; }

        /* 跑馬燈執行畫面 */
        #marquee-page { background: #000; padding: 0; justify-content: center; align-items: center; }
        .marquee-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .marquee-container { overflow: hidden; white-space: nowrap; width: 100%; box-sizing: border-box; position: relative; }
.marquee-text { 
    display: inline-block; 
    padding-left: 100%; 
    font-size: 6vw; 
    font-weight: bold; 
    color: #ffaa00; 
    white-space: nowrap; 
    text-shadow: 0 0 15px rgba(255, 170, 0, 0.6); 
    animation: marqueeScroll 15s linear infinite; 
}
@keyframes marqueeScroll {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
}

        .marquee-text.arriving { color: #ff3300; text-shadow: 0 0 25px rgba(255, 51, 0, 0.9); animation: blink 0.6s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.35; } }
        .gps-info-overlay { position: absolute; bottom: 20px; font-size: 14px; color: #aaa; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- 主選單 -->
    <div class="menu-container" id="main-menu">
        <h1>🚌 公車智慧播報系統</h1>
        <button class="menu-btn" onclick="openPage('route-menu-page')">1. 路線管理 (選擇/編輯/刪除)</button>
        <button class="menu-btn" onclick="openPage('broadcast-page')">2. 選擇或新建政令廣播</button>
        <button class="menu-btn" onclick="openPage('voice-page')">3. 語音參數調節</button>
        <button class="menu-btn" onclick="startMarqueeMode()" style="background: #007bff;">4. 執行跑馬燈與自動報站</button>
    </div>

    <!-- 路線管理主選單 -->
    <div class="page" id="route-menu-page">
        <div class="back-bar">
            <button class="back-btn" onclick="closePage('route-menu-page')">⬅️ 返回選單</button>
            <h2>路線管理</h2>
            <div></div>
        </div>
        <button class="btn-primary" onclick="openPage('select-route-page'); renderRouteList();" style="margin-bottom: 15px;">📁 選擇 / 刪除現有路線</button>
        <button class="btn-primary" onclick="openPage('create-route-page')" style="background: #007bff;">➕ 建立新路線</button>
    </div>

    <!-- 子頁面 1-1：選擇與刪除路線 -->
    <div class="page" id="select-route-page">
        <div class="back-bar">
            <button class="back-btn" onclick="closePage('select-route-page')">⬅️ 返回</button>
            <h2>選擇或刪除路線</h2>
            <div></div>
        </div>
        <div id="route-list-container"></div>
    </div>

    <!-- 子頁面 1-2：建立新路線與編輯站點 -->
    <div class="page" id="create-route-page">
        <div class="back-bar">
            <button class="back-btn" onclick="closePage('create-route-page')">⬅️ 返回</button>
            <h2>建立與編輯路線站點</h2>
            <div></div>
        </div>
        
        <!-- 調整後的大小適中路線名稱輸入框 -->
        <div class="route-name-container">
            <label for="newRouteName">路線名稱：</label>
            <input type="text" id="newRouteName" placeholder="例如: 6767路打狗客運">
        </div>

        <div class="input-group">
            <h3 style="margin: 0 0 10px 0; color: #ffaa00; font-size: 16px;">➕ 新增站點</h3>
            <div class="input-row">
                <input type="text" id="stationNickname" placeholder="站名（例如：總公司）">
                <input type="text" id="stationAddress" placeholder="真實地址（例如：台北市信義路五段7號）">
            </div>
            <button id="addStationBtn">查詢座標並新增站點</button>
            <div id="searchStatus" class="search-status"></div>
        </div>

        <h3 style="font-size: 16px; margin: 10px 0;">📋 站點清單（可按住 ☰ 上下拖曳排序）</h3>
        <ul id="stationList"></ul>

        <button class="btn-primary" onclick="saveCurrentRoute()" style="background-color: #28a745; margin-top: 20px;">💾 儲存整條路線</button>
    </div>

    <!-- 頁面 2：政令廣播設定 -->
    <div class="page" id="broadcast-page">
        <div class="back-bar">
            <button class="back-btn" onclick="closePage('broadcast-page')">⬅️ 返回選單</button>
            <h2>政令廣播內容</h2>
            <div></div>
        </div>
        <input type="text" id="broadcastInput" placeholder="輸入廣播內容（例如：請配合防疫佩戴口罩）">
        <button class="btn-primary" onclick="addBroadcast()">新增並儲存廣播</button>
        <ul id="broadcastListUI" style="margin-top: 15px;"></ul>
    </div>

    <!-- 頁面 3：語音參數調節 -->
    <div class="page" id="voice-page">
        <div class="back-bar">
            <button class="back-btn" onclick="closePage('voice-page')">⬅️ 返回選單</button>
            <h2>語音設定 (自動儲存不重置)</h2>
            <div></div>
        </div>
        <label>語速 (Speed: <span id="speedVal">1.0</span>)</label>
        <input type="range" id="speechRate" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateVoiceSettings()">
        
        <label style="margin-top: 15px;">音高 (Pitch: <span id="pitchVal">1.0</span>)</label>
        <input type="range" id="speechPitch" min="0.5" max="1.5" step="0.1" value="1.0" oninput="updateVoiceSettings()">

        <label style="margin-top: 15px;">音量 (Volume: <span id="volVal">1.0</span>)</label>
        <input type="range" id="speechVol" min="0.0" max="1.0" step="0.1" value="1.0" oninput="updateVoiceSettings()">
        
        <button class="btn-primary" onclick="testVoice()" style="margin-top: 25px;">🔊 測試語音</button>
    </div>

    <!-- 頁面 4：跑馬燈與 GPS 執行頁面 -->
    <div class="page" id="marquee-page" ondblclick="returnToMenuFromMarquee()">
        <div class="marquee-wrapper">
            <div class="marquee-container">
                <div class="marquee-text" id="activeMarqueeText">載入中...</div>
            </div>
            <div class="gps-info-overlay" id="gpsInfoOverlay">GPS 偵測中... (雙擊畫面任意處返回選單)</div>
        </div>
    </div>

    <script>
        let routes = JSON.parse(localStorage.getItem('bus_routes')) || [];
        let currentRouteIndex = parseInt(localStorage.getItem('bus_current_route')) || 0;
        let broadcasts = JSON.parse(localStorage.getItem('bus_broadcasts')) || ['請隨身攜帶好個人隨身行李', '上下車請刷卡，祝您旅途愉快'];
        let voiceSettings = JSON.parse(localStorage.getItem('bus_voice')) || { rate: 1.0, pitch: 1.0, volume: 1.0 };
        
        let editingStations = [];
        let watchId = null;
        let currentStationIndex = 0;
        let marqueeTimer = null;

        document.getElementById('speechRate').value = voiceSettings.rate;
        document.getElementById('speedVal').innerText = voiceSettings.rate;
        document.getElementById('speechPitch').value = voiceSettings.pitch;
        document.getElementById('pitchVal').innerText = voiceSettings.pitch;
        document.getElementById('speechVol').value = voiceSettings.volume;
        document.getElementById('volVal').innerText = voiceSettings.volume;

        function openPage(pageId) { 
            document.getElementById(pageId).classList.add('active'); 
            if(pageId === 'broadcast-page') renderBroadcastUI(); 
            if(pageId === 'create-route-page') initRouteEditor();
        }
        function closePage(pageId) { document.getElementById(pageId).classList.remove('active'); }

        // ---- 初始化拖曳排序功能 (Sortable.js) ----
        document.addEventListener('DOMContentLoaded', () => {
            const stationListEl = document.getElementById('stationList');
            if(stationListEl) {
                Sortable.create(stationListEl, {
                    animation: 150,
                    handle: '.drag-handle',
                    direction: 'vertical',
                    lockAxis: 'y',
                    forceFallback: true,
                    onEnd: function (evt) {
                        const oldIndex = evt.oldIndex;
                        const newIndex = evt.newIndex;
                        if (oldIndex === newIndex) return;

                        const movedItem = editingStations.splice(oldIndex, 1)[0];
                        editingStations.splice(newIndex, 0, movedItem);
                        renderEditingStations();
                    }
                });
            }
        });

        function initRouteEditor() {
            if(routes.length > 0 && routes[currentRouteIndex]) {
                const r = routes[currentRouteIndex];
                document.getElementById('newRouteName').value = r.name;
                editingStations = JSON.parse(JSON.stringify(r.stations || []));
            } else {
                document.getElementById('newRouteName').value = '';
                editingStations = [];
            }
            renderEditingStations();
        }

        // ---- 查詢座標並限制「找不到座標不得加入」 ----
        document.getElementById('addStationBtn').addEventListener('click', async () => {
            const nickname = document.getElementById('stationNickname').value.trim();
            const address = document.getElementById('stationAddress').value.trim();
            const searchStatus = document.getElementById('searchStatus');

            if (!nickname || !address) {
                alert('請同時填寫站名與真實地址！');
                return;
            }

            searchStatus.textContent = `正在查詢 "${address}" 的地理位置...`;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();

                if (!data || data.length === 0) {
                    searchStatus.textContent = `❌ 查無此地址的經緯度，無法新增站點！`;
                    alert(`查無此地址「${address}」的地理座標，請確認地址是否正確或重新輸入！`);
                    return; // 找不到座標直接阻擋，不加入清單
                }

                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                searchStatus.textContent = `✅ 成功取得地理位置座標！`;
                
                editingStations.push({ name: nickname, address: address, lat: lat, lon: lon });

                document.getElementById('stationNickname').value = '';
                document.getElementById('stationAddress').value = '';
                renderEditingStations();
            } catch (error) {
                searchStatus.textContent = `❌ 地圖服務連線失敗，無法取得座標。`;
                alert('地圖服務連線失敗，請檢查網路後重試。');
            }
        });

        function renderEditingStations() {
            const list = document.getElementById('stationList');
            list.innerHTML = '';
            
            if(editingStations.length === 0) {
                list.innerHTML = '<p style="color:#888; text-align:center;">目前尚無站點，請在上方新增</p>';
                return;
            }

            editingStations.forEach((s, idx) => {
                const li = document.createElement('li');
                const coordText = `(座標: ${s.lat.toFixed(2)}, ${s.lon.toFixed(2)})`;
                li.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                        <span class="drag-handle">☰</span>
                        <div style="flex: 1;">
                            <strong>${idx + 1}. ${s.name}</strong>
                            <div class="station-info">${s.address || ''} ${coordText}</div>
                        </div>
                        <div class="actions">
                            <button class="delete-btn" onclick="removeEditingStation(${idx})">刪除</button>
                        </div>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        window.removeEditingStation = function(idx) {
            editingStations.splice(idx, 1);
            renderEditingStations();
        }

        function saveCurrentRoute() {
            const name = document.getElementById('newRouteName').value.trim();
            if(!name) { alert('請輸入路線名稱！'); return; }
            if(editingStations.length < 2) { alert('一條路線至少需要包含起點與終點等 2 個以上站點！'); return; }

            const newRoute = {
                name: name,
                start: editingStations[0].name,
                end: editingStations[editingStations.length - 1].name,
                stations: editingStations
            };

            if(routes[currentRouteIndex] && routes[currentRouteIndex].name === name) {
                routes[currentRouteIndex] = newRoute;
            } else {
                routes.push(newRoute);
                currentRouteIndex = routes.length - 1;
            }

            localStorage.setItem('bus_routes', JSON.stringify(routes));
            localStorage.setItem('bus_current_route', currentRouteIndex);

            alert('路線儲存成功！');
            closePage('create-route-page');
        }

        function renderRouteList() {
            const container = document.getElementById('route-list-container');
            container.innerHTML = '';
            if(routes.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888;">目前沒有已建立的路線，請先去建立！</p>';
                return;
            }

            routes.forEach((r, idx) => {
                const div = document.createElement('div');
                div.style = "display:flex; justify-content:space-between; align-items:center; background:#222; border:1px solid #444; padding:12px; margin-bottom:8px; border-radius:6px;";
                const isSelected = (idx === currentRouteIndex) ? '🔥 [使用中]' : '';
                div.innerHTML = `
                    <div>
                        <strong>${r.name}</strong> ${isSelected}<br>
                        <small style="color:#aaa;">${r.start || '起'} ➔ ${r.end || '終'} (共 ${r.stations.length} 站)</small>
                    </div>
                    <div>
                        <button class="btn-primary" style="padding:6px 10px; font-size:14px; width:auto; margin-right:5px;" onclick="selectRoute(${idx})">選擇</button>
                        <button class="btn-danger" onclick="deleteRoute(${idx})">刪除</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function selectRoute(idx) {
            currentRouteIndex = idx;
            localStorage.setItem('bus_current_route', currentRouteIndex);
            alert(`已切換至路線：${routes[idx].name}`);
            renderRouteList();
        }

        function deleteRoute(idx) {
            if(confirm(`確定要刪除「${routes[idx].name}」這條路線嗎？`)) {
                routes.splice(idx, 1);
                if(currentRouteIndex >= routes.length) currentRouteIndex = Math.max(0, routes.length - 1);
                localStorage.setItem('bus_routes', JSON.stringify(routes));
                localStorage.setItem('bus_current_route', currentRouteIndex);
                renderRouteList();
            }
        }

        function renderBroadcastUI() {
            const list = document.getElementById('broadcastListUI');
            list.innerHTML = '';
            broadcasts.forEach((b, idx) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${b}</span> <button class="btn-danger" onclick="removeBroadcast(${idx})">刪除</button>`;
                list.appendChild(li);
            });
        }

        function addBroadcast() {
            const val = document.getElementById('broadcastInput').value.trim();
            if(!val) return;
            broadcasts.push(val);
            localStorage.setItem('bus_broadcasts', JSON.stringify(broadcasts));
            document.getElementById('broadcastInput').value = '';
            renderBroadcastUI();
        }

        function removeBroadcast(idx) {
            broadcasts.splice(idx, 1);
            localStorage.setItem('bus_broadcasts', JSON.stringify(broadcasts));
            renderBroadcastUI();
        }

        function updateVoiceSettings() {
            voiceSettings.rate = parseFloat(document.getElementById('speechRate').value);
            voiceSettings.pitch = parseFloat(document.getElementById('speechPitch').value);
            voiceSettings.volume = parseFloat(document.getElementById('speechVol').value);
            document.getElementById('speedVal').innerText = voiceSettings.rate;
            document.getElementById('pitchVal').innerText = voiceSettings.pitch;
            document.getElementById('volVal').innerText = voiceSettings.volume;
            localStorage.setItem('bus_voice', JSON.stringify(voiceSettings));
        }

        function speak(text, callback) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = voiceSettings.rate;
            utterance.pitch = voiceSettings.pitch;
            utterance.volume = voiceSettings.volume;
            utterance.lang = 'zh-TW';
            if(callback) utterance.onend = callback;
            window.speechSynthesis.speak(utterance);
        }

        function testVoice() { speak('歡迎搭乘打狗客運，語音測試正常'); }

        function startMarqueeMode() {
            if(routes.length === 0 || !routes[currentRouteIndex] || routes[currentRouteIndex].stations.length === 0) {
                alert('請先設定好路線與至少一個站點！'); return;
            }
            openPage('marquee-page');
            currentStationIndex = 0; // 直接由起點開始由 GPS 判斷
            
            const route = routes[currentRouteIndex];
            const welcomeText = `歡迎搭乘${route.name}。本車由${route.start}開往${route.end}。祝您旅途愉快一路平安`;
            
            const el = document.getElementById('activeMarqueeText');
            el.textContent = `歡迎搭乘${route.name} 本車由${route.start}開往${route.end} 祝您旅途愉快一路平安`;
            
            speak(welcomeText, () => {
                startGpsTracking();
                runQueueLoop();
            });
        }

        function returnToMenuFromMarquee() {
            if(watchId !== null) navigator.geolocation.clearWatch(watchId);
            clearTimeout(marqueeTimer);
            if('speechSynthesis' in window) window.speechSynthesis.cancel();
            closePage('marquee-page');
        }

        function startGpsTracking() {
            if(!navigator.geolocation) { alert('此裝置不支援 GPS'); return; }
            watchId = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                checkStationDistance(lat, lon);
            }, err => {
                document.getElementById('gpsInfoOverlay').innerText = 'GPS 訊號讀取中...';
            }, { enableHighAccuracy: true });
        }

        function checkStationDistance(lat, lon) {
            const route = routes[currentRouteIndex];
            if(currentStationIndex >= route.stations.length) {
                document.getElementById('gpsInfoOverlay').innerText = '已抵達終點站';
                return;
            }
            const target = route.stations[currentStationIndex];
            const dist = getDistanceFromLatLonInMeters(lat, lon, target.lat, target.lon);
            const el = document.getElementById('activeMarqueeText');
            
            if(dist <= 100) {
                el.classList.add('arriving');
                el.textContent = `即將進站：${target.name}`;
                document.getElementById('gpsInfoOverlay').innerText = `距離 ${target.name} 約 ${Math.round(dist)} 公尺`;
            } else {
                el.classList.remove('arriving');
                document.getElementById('gpsInfoOverlay').innerText = `前往：${target.name} (距離 ${Math.round(dist)} 公尺)`;
            }

            if(dist <= 20) {
                currentStationIndex++;
                if(currentStationIndex < route.stations.length) {
                    speak(`下一站，${route.stations[currentStationIndex].name}`);
                }
            }
        }

        function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2-lat1)*(Math.PI/180);
            const dLon = (lon2-lon1)*(Math.PI/180);
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*(Math.PI/180))*Math.cos(lat2*(Math.PI/180))*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function runQueueLoop() {
            const route = routes[currentRouteIndex];
            let items = [];
            if(currentStationIndex < route.stations.length) {
                items.push(`下一站：${route.stations[currentStationIndex].name}`);
            } else {
                items.push('本班車已行駛至終點站');
            }
            broadcasts.forEach(b => items.push(b));

            let qIdx = 0;
            function showNext() {
                const el = document.getElementById('activeMarqueeText');
                if(!el.classList.contains('arriving')) {
                    el.textContent = items[qIdx];
                }
                qIdx = (qIdx + 1) % items.length;
                marqueeTimer = setTimeout(showNext, 6000);
            }
            showNext();
        }
    </script>
</body>
</html>
